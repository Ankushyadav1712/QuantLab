server {
    listen 80;
    server_name _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback — every unknown path serves index.html so the app's
    # own router (or none) can decide what to render.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed assets are immutable; let the browser cache them.
    location ~* \.(js|css|svg|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Don't cache index.html — new bundle hashes need to load on next visit.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
