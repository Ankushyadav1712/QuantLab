# Dependabot opens weekly PRs to bump backend pip deps, frontend npm deps,
# and the GitHub Actions versions used in workflows. Grouping minor + patch
# updates into one PR per ecosystem keeps the PR queue manageable; majors
# stay separate so they get individual review.

version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      pip-minor-and-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: "deps(backend)"
    labels: [dependencies, backend]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-minor-and-patch:
        update-types: [minor, patch]
    commit-message:
      prefix: "deps(frontend)"
    labels: [dependencies, frontend]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    commit-message:
      prefix: "deps(ci)"
    labels: [dependencies, ci]

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    commit-message:
      prefix: "deps(docker-backend)"
    labels: [dependencies, docker]

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    commit-message:
      prefix: "deps(docker-frontend)"
    labels: [dependencies, docker]
