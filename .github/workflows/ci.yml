name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Cancel in-flight runs for the same branch when a new push lands so the
# Actions queue doesn't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # Cache the parquet data (50 tickers × 32 fields ~ 23 MB) keyed by
      # universe config so we don't hit yfinance on every CI run.  Cache is
      # invalidated automatically when config.py or fetcher.py changes.
      - name: Restore data cache
        id: cache-data
        uses: actions/cache@v4
        with:
          path: backend/data/cache
          key: data-cache-${{ hashFiles('backend/config.py', 'backend/data/fetcher.py') }}-v1

      - name: Pre-populate market data on cache miss
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: |
          cd backend
          python scripts/download_data.py
        # The script is idempotent, but yfinance can be flaky from CI runners.
        # Don't fail the whole CI just because a download timed out.
        continue-on-error: true

      - name: Run pytest
        run: |
          python -m pytest backend/tests/ -v --tb=short --color=yes
        env:
          PYTHONUNBUFFERED: "1"
          ENVIRONMENT: development
