name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Cancel in-flight runs for the same branch when a new push lands so the
# Actions queue doesn't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# pull-requests: write is needed for the coverage-comment job to post on PRs.
permissions:
  contents: read
  pull-requests: write

jobs:
  # ----------------------------------------------------------------------
  # Lint backend with ruff. Fast (~30s) and runs in parallel with tests.
  # ----------------------------------------------------------------------
  lint-backend:
    name: ruff (backend)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install ruff
        run: pip install -r backend/requirements-dev.txt
      - name: ruff check
        run: ruff check backend/
      - name: ruff format check
        run: ruff format --check backend/

  # ----------------------------------------------------------------------
  # Backend tests. Same as the original job, just renamed for clarity.
  # ----------------------------------------------------------------------
  test-backend:
    name: pytest (backend)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # Cache the parquet data (50 tickers × 32 fields ~ 23 MB) keyed by
      # universe config so we don't hit yfinance on every CI run. Cache is
      # invalidated automatically when config.py or fetcher.py changes.
      - name: Restore data cache
        id: cache-data
        uses: actions/cache@v4
        with:
          path: backend/data/cache
          key: data-cache-${{ hashFiles('backend/config.py', 'backend/data/fetcher.py') }}-v1

      - name: Pre-populate market data on cache miss
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: |
          cd backend
          python scripts/download_data.py
        # The script is idempotent, but yfinance can be flaky from CI runners.
        # Don't fail the whole CI just because a download timed out.
        continue-on-error: true

      - name: Install pytest-cov + hypothesis
        # hypothesis powers backend/tests/test_operators_hypothesis.py (Tier 5 #9).
        # Kept out of production requirements.txt (test-only); installed here
        # alongside pytest-cov so the test-backend job has both.
        run: pip install pytest-cov==6.0.0 'hypothesis>=6.100,<7'

      - name: Run pytest with coverage
        run: |
          python -m pytest backend/tests/ -v --tb=short --color=yes \
            --cov --cov-report=xml --cov-report=term
        env:
          PYTHONUNBUFFERED: "1"
          ENVIRONMENT: development

      # Save coverage.xml so it's downloadable from the run page.
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

      # Render coverage.xml into a markdown table. Posted to the run summary
      # always, and as a sticky PR comment when triggered by a PR — so review
      # happens inline with the diff.
      - name: Build coverage summary
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          fail_below_min: false
          format: markdown
          hide_complexity: true
          indicators: true
          output: both
          thresholds: "60 80"

      - name: Append to job summary
        if: always()
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post coverage on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: code-coverage-results.md

  # ----------------------------------------------------------------------
  # Type-check backend with mypy. Lenient config (see pyproject.toml)
  # so we catch real bugs without forcing every function to be annotated.
  # ----------------------------------------------------------------------
  typecheck-backend:
    name: mypy (backend)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt
      - name: mypy
        run: mypy backend/

  # ----------------------------------------------------------------------
  # Scan pinned pip deps for known CVEs. Non-blocking initially —
  # a freshly-disclosed CVE shouldn't break trunk before we can react.
  # Flip `continue-on-error` to false once the project's CVE hygiene is
  # routine.
  # ----------------------------------------------------------------------
  audit-backend:
    name: pip-audit (backend)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install pip-audit
        run: pip install pip-audit==2.9.0
      - name: Audit
        run: pip-audit -r backend/requirements.txt --strict

  # ----------------------------------------------------------------------
  # Frontend: install, run vitest tests, and verify the production build.
  # Catches broken JS / failing tests before they reach Render's deploy.
  # ----------------------------------------------------------------------
  build-frontend:
    name: vite build + vitest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build production bundle
        run: npm run build

  # ----------------------------------------------------------------------
  # Verify both Dockerfiles still build. We don't push the images — this
  # job exists purely to fail fast if a Dockerfile change breaks deploy.
  # ----------------------------------------------------------------------
  build-docker:
    name: docker build (backend + frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: quantlab-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: quantlab-frontend:ci
          build-args: |
            VITE_API_URL=http://localhost:8000
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
