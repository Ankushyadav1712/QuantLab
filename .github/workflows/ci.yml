name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Cancel in-flight runs for the same branch when a new push lands so the
# Actions queue doesn't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------------
  # Lint backend with ruff. Fast (~30s) and runs in parallel with tests.
  # ----------------------------------------------------------------------
  lint-backend:
    name: ruff (backend)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install ruff
        run: pip install -r backend/requirements-dev.txt
      - name: ruff check
        run: ruff check backend/
      - name: ruff format check
        run: ruff format --check backend/

  # ----------------------------------------------------------------------
  # Backend tests. Same as the original job, just renamed for clarity.
  # ----------------------------------------------------------------------
  test-backend:
    name: pytest (backend)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # Cache the parquet data (50 tickers × 32 fields ~ 23 MB) keyed by
      # universe config so we don't hit yfinance on every CI run. Cache is
      # invalidated automatically when config.py or fetcher.py changes.
      - name: Restore data cache
        id: cache-data
        uses: actions/cache@v4
        with:
          path: backend/data/cache
          key: data-cache-${{ hashFiles('backend/config.py', 'backend/data/fetcher.py') }}-v1

      - name: Pre-populate market data on cache miss
        if: steps.cache-data.outputs.cache-hit != 'true'
        run: |
          cd backend
          python scripts/download_data.py
        # The script is idempotent, but yfinance can be flaky from CI runners.
        # Don't fail the whole CI just because a download timed out.
        continue-on-error: true

      - name: Run pytest
        run: python -m pytest backend/tests/ -v --tb=short --color=yes
        env:
          PYTHONUNBUFFERED: "1"
          ENVIRONMENT: development

  # ----------------------------------------------------------------------
  # Frontend: install, run vitest tests, and verify the production build.
  # Catches broken JS / failing tests before they reach Render's deploy.
  # ----------------------------------------------------------------------
  build-frontend:
    name: vite build + vitest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build production bundle
        run: npm run build

  # ----------------------------------------------------------------------
  # Verify both Dockerfiles still build. We don't push the images — this
  # job exists purely to fail fast if a Dockerfile change breaks deploy.
  # ----------------------------------------------------------------------
  build-docker:
    name: docker build (backend + frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: quantlab-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: quantlab-frontend:ci
          build-args: |
            VITE_API_URL=http://localhost:8000
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
